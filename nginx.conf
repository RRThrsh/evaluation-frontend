resolver 127.0.0.11 valid=10s;

# TLS is terminated at the upstream load balancer / reverse proxy.
# This nginx only serves HTTP on port 80.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Uncomment below and provide certs for standalone HTTPS deployment:
    # listen 443 ssl;
    # ssl_certificate     /etc/nginx/ssl/cert.pem;
    # ssl_certificate_key /etc/nginx/ssl/key.pem;

    location /api {
        set $backend_upstream http://backend:3000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }
}
